<body>

        <div class="home-button">
            <a href="portfolio-homepage.html">Home</a>

        <div class="achivments-button">

    <div id="container">
        <h3>monthly budget planner</h3>
        <div class="box">
                <h3> monthly income</h3>
                <input type="number" id="salaryInput" placeholder="salary"/>
               <button onclick="addSalary()">Add Salary</button>
                <div class="input-group">
            <h3> monthly expenses</h3>
            <input type="number" id="rentInput" placeholder="rent"/>
            <button onclick="addRent()">Add Rent</button>
            <br />
            <input type="number" id="uttilInput" placeholder="utilities"/>
            <button onclick="addUtilities()">Add Utilities</button>
        </div>

        </div>
        
        <div class="summary">
            <h3> monthly summary</h3>
            <p>Total Income: $<span id="totalIncome">0</span></p>
            <p>Total Expenses: $<span id="totalExpenses">0</span></p>
            <p>Rent: $<span id="rentExpense">0</span></p>
        </div>
        <div class="summary">
            <h3> annual summary</h3>
            <p>Total Income: $<span id="annualIncome">0</span></p>
            <p>Total Expenses: $<span id="annualExpenses">0</span></p>
            <p>Annual Rent: $<span id="annualRent">0</span></p>
        </div>
       

    </div>
